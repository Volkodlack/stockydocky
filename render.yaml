# Configuration de déploiement Render pour InventPro Stock
# Doc : https://render.com/docs/blueprint-spec
#
# 1 service web Node (sert l'API REST + le frontend React buildé)
# 1 base de données PostgreSQL managée
#
# Déploiement : connecter le dépôt Git à Render -> "New Blueprint" -> ce fichier
# est détecté automatiquement.

services:
  - type: web
    name: inventpro-stock
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm run render-build
    startCommand: npm run render-start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inventpro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Identifiants du compte administrateur créé au premier déploiement (seed).
      # À MODIFIER après la première connexion.
      - key: SEED_ADMIN_EMAIL
        value: admin@inventpro.local
      - key: SEED_ADMIN_PASSWORD
        value: Admin123!

databases:
  - name: inventpro-db
    plan: free
    region: frankfurt
    databaseName: inventpro
    user: inventpro
